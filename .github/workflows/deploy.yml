name: Deploy to OpenStack

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # Step 1: Copy your code files
    - name: Copy Files to OpenStack VM
      run: |
        echo "Uploading files to ${{ secrets.VM_IP }}..."
        scp -o StrictHostKeyChecking=no -i ~/.ssh/pipeline_rsa generate_data.py secure_processor.py requirements.txt ubuntu@${{ secrets.VM_IP }}:/home/ubuntu/
        echo "Files uploaded successfully."

    # Step 2: Verify the environment (No internet required)
    - name: Verify Environment
      run: |
        echo "Verifying environment on remote server..."
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/pipeline_rsa ubuntu@${{ secrets.VM_IP }} "python3 -c 'import pandas; import numpy; print(\"Pandas/Numpy check: PASSED\")'"
        echo "Environment verification complete."