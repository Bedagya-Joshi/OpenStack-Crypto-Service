name: Deploy to OpenStack

# Trigger this workflow only when you push to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted # <--- THIS IS THE MAGIC CHANGE

    steps:
    # Step 1: Check out your code from the repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # Step 2: Configure the SSH Key (stored in GitHub Secrets)
    - name: Install SSH Key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        known_hosts: unnecessary # We will handle known_hosts in the next step
        if_key_exists: replace

    # Step 3: Add the OpenStack Server to known hosts (prevents "Are you sure?" prompt)
    - name: Add Known Hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.VM_IP }} >> ~/.ssh/known_hosts

    # Step 4: Copy your Python files to the Server
    - name: Copy Files to OpenStack VM
      run: |
        echo "Uploading files to ${{ secrets.VM_IP }}..."
        # We copy specific files to avoid copying the .git folder or junk
        scp generate_data.py ubuntu@${{ secrets.VM_IP }}:/home/ubuntu/
        scp secure_processor.py ubuntu@${{ secrets.VM_IP }}:/home/ubuntu/
        scp requirements.txt ubuntu@${{ secrets.VM_IP }}:/home/ubuntu/
        echo "Files uploaded successfully."

    # Step 5: Install the libraries on the Server
    - name: Install Requirements on VM
      run: |
        echo "Installing dependencies on remote server..."
        ssh ubuntu@${{ secrets.VM_IP }} "sudo apt update && sudo apt install python3-pip -y"
        ssh ubuntu@${{ secrets.VM_IP }} "pip3 install -r requirements.txt"
        echo "Dependencies installed."