name: Deploy to OpenStack

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    # Step 1: Check out your code from the repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # Step 2: Officially configure SSH without manual files
    - name: Setup SSH Agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    # Step 3: Copy your Python files to the Server
    - name: Copy Files to OpenStack VM
      run: |
        echo "Uploading files to ${{ secrets.VM_IP }}..."
        scp -o StrictHostKeyChecking=no -o PubkeyAcceptedKeyTypes=+ssh-rsa generate_data.py secure_processor.py requirements.txt ubuntu@${{ secrets.VM_IP }}:/home/ubuntu/
        echo "Files uploaded successfully."

    # Step 4: Install the libraries on the Server
    - name: Install Requirements on VM
      run: |
        echo "Installing dependencies on remote server..."
        ssh -o StrictHostKeyChecking=no -o PubkeyAcceptedKeyTypes=+ssh-rsa ubuntu@${{ secrets.VM_IP }} "sudo apt update && sudo apt install python3-pip -y"
        ssh -o StrictHostKeyChecking=no -o PubkeyAcceptedKeyTypes=+ssh-rsa ubuntu@${{ secrets.VM_IP }} "pip3 install -r requirements.txt"
        echo "Dependencies installed."