name: Deploy to OpenStack

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    # Step 1: Check out your code from GitHub
    - name: Checkout Code
      uses: actions/checkout@v3

    # Step 2: Copy files directly using our verified RSA key
    - name: Copy Files to OpenStack VM
      run: |
        echo "Uploading files to ${{ secrets.VM_IP }}..."
        scp -o StrictHostKeyChecking=no -i ~/.ssh/pipeline_rsa generate_data.py secure_processor.py requirements.txt ubuntu@${{ secrets.VM_IP }}:/home/ubuntu/
        echo "Files uploaded successfully."

    # Step 3: Install the Python libraries on the Server
    - name: Install Requirements on VM
      run: |
        echo "Installing dependencies on remote server..."
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/pipeline_rsa ubuntu@${{ secrets.VM_IP }} "sudo apt update && sudo apt install python3-pip -y"
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/pipeline_rsa ubuntu@${{ secrets.VM_IP }} "pip3 install -r requirements.txt"
        echo "Dependencies installed."